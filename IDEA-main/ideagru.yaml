# idea
num_subseq: 3 # 2,3
num_env: 4 # 2,3,4,5
temp: 0.1
emb_size: 64
embedding_size: 64
fake_ratio: 0 # 0, 0.05, 0.1, 0.2
var_hyper: 1
alpha: 0.1

# dataset
dataset: ml-100k
data_path: ../data/movielens
# dataset: Amazon_Beauty
# dataset: Amazon_Sports_and_Outdoors
TIME_FIELD: timestamp
load_col:
    inter: [user_id, item_id,timestamp]
ITEM_LIST_LENGTH_FIELD: item_length
LIST_SUFFIX: _list
MAX_ITEM_LIST_LENGTH: 200 # 50 for amazon datasets
user_inter_num_interval: "[5,inf)"
item_inter_num_interval: "[5,inf)"
field_separator: "\t"
seq_separator: " "

# gru
emb_size: 64
hidden_size: 128
num_layers: 1
dropout_prob: 0.3
loss_type: 'CE'

# train & eval
gpu_id: '0'
epochs: 500
train_batch_size: 1024
eval_batch_size: 2048
train_neg_sample_args: ~
eval_args:
    # group_by: user
    order: TO
    split: {'LS': 'valid_and_test'}
    mode: full
metrics: ['Recall', 'NDCG']
topk: [10, 20]
valid_metric: NDCG@10
metric_decimal_place: 4
