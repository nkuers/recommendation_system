# dataset + eval settings for RecBole (amazon-beauty-5core-longseq, full-sort)
data_path: data/amazon
dataset: amazon-beauty-5core-longseq
field_separator: "\t"
MAX_ITEM_LIST_LENGTH: 32

USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
RATING_FIELD: rating
TIME_FIELD: timestamp

load_col:
  inter: [user_id, item_id, rating, timestamp]

eval_args:
  group_by: user
  order: TO
  split:
    LS: valid_and_test
  mode: full

metrics: ["Hit", "NDCG", "MRR"]
topk: [10]


# Module C defaults for sports-longseq-full
contrastive_weight: 0.03
contrastive_temp: 0.2
time_aug_prob: 0.15
time_aug_strength: 0.05
time_aug_warmup_steps: 0
time_aug_ramp_steps: 2000