data_path: data/amazon
dataset: amazon-electronics-5core-subset-idurl
field_separator: "\t"
MAX_ITEM_LIST_LENGTH: 32

USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
RATING_FIELD: rating
TIME_FIELD: timestamp

load_col:
  inter: [user_id, item_id, rating, timestamp, newc_degree, sem_aug, sem_aug_lengths]

eval_args:
  group_by: user
  order: TO
  split:
    LS: valid_and_test
  mode:
    valid: uni100
    test: uni100

metrics: ["Hit", "NDCG", "MRR"]
topk: [10]
