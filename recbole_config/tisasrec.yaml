# model settings for TiSASRec
model: TiSASRec
model_name: TiSASRec

hidden_size: 64
inner_size: 256
n_layers: 2
n_heads: 4
hidden_dropout_prob: 0.2
attn_dropout_prob: 0.2
hidden_act: gelu
layer_norm_eps: 1e-12
initializer_range: 0.02
time_span: 256

loss_type: BCE
train_neg_sample_args: {distribution: uniform, sample_num: 1}
learning_rate: 0.001
epochs: 100
early_stop: 10
train_batch_size: 256
eval_batch_size: 512
neg_sampling: null
show_progress: True
seed: 2022
