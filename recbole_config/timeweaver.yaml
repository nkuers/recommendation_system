# model settings for TimeWeaver
model: TimeWeaver
model_name: TimeWeaver

hidden_size: 64
num_layers: 2
hidden_dropout_prob: 0.5
initializer_range: 0.02

time_bucket_size: 1000
ema_decay: 0.5
tcn_kernel_size: -1
ffn_hidden_size: 256

loss_type: CE
learning_rate: 0.001
epochs: 100
early_stop: 10
train_batch_size: 256
eval_batch_size: 512
valid_metric: Hit@10
valid_metric_bigger: true
neg_sampling: null
show_progress: True
seed: 2022
