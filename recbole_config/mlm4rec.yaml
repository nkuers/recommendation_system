# model settings for MLM4Rec
model: MLM4Rec
model_name: MLM4Rec

hidden_size: 64
num_hidden_layers: 2
num_attention_heads: 2
hidden_act: gelu
attention_probs_dropout_prob: 0.5
hidden_dropout_prob: 0.5
initializer_range: 0.02
local_hidden_size: 128
kernel_sizes: [3, 5, 7, 9]

kernel: 3
cmlp_type: 1
merge_type: weightavg

loss_type: BPR
learning_rate: 0.001
epochs: 100
early_stop: 10
train_batch_size: 256
eval_batch_size: 512
neg_sampling: null
show_progress: True
seed: 2022
