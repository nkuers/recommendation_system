# model settings for LICRec (RecBole)
model: LICRec

hidden_size: 128
hidden_dropout_prob: 0.1
loss_type: BPR
learning_rate: 0.0005
epochs: 100
early_stop: 10
train_batch_size: 256
eval_batch_size: 512
neg_sampling: null
show_progress: True
seed: 2022

# LIC specific
short_len: 10
gsu_topk: 100
num_heads: 4
time_mlp_hidden: 32
day_seconds: 86400
use_circular_time: True

device: cpu
