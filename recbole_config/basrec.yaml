model: BASRec
model_name: BASRec

n_layers: 2
n_heads: 2
hidden_size: 64
inner_size: 256
hidden_dropout_prob: 0.2
attn_dropout_prob: 0.2
hidden_act: gelu
layer_norm_eps: 1e-12
initializer_range: 0.02
max_seq_length: 32

# BASRec augmentation controls
rec_weight: 1.0
aml_weight: 1.0
wml_weight: 1.0
n_pairs: 1
n_whole_level: 1
substitute_rate: 0.2
reorder_rate: 0.3
rate_min: 0.2
rate_max: 0.51
substitute_topk: 20
beta: 0.3
base_augment_type: random

loss_type: BCE
learning_rate: 0.001
epochs: 100
early_stop: 10
train_batch_size: 256
eval_batch_size: 512
train_neg_sample_args: null
neg_sampling: null
seed: 2022
