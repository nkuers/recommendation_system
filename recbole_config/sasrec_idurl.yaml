model: SASRec_IDURL
model_name: SASRec_IDURL

n_layers: 2
n_heads: 2
hidden_size: 64
inner_size: 256
hidden_dropout_prob: 0.2
attn_dropout_prob: 0.2
hidden_act: gelu
layer_norm_eps: 1e-12
initializer_range: 0.02
loss_type: CE

n_facet_all: 5
new_repr_dp: 1
disen_lambda: 0.3
idra: 1
align_lambda: 0.4

learning_rate: 0.001
epochs: 100
early_stop: 10
train_batch_size: 256
eval_batch_size: 512
neg_sampling: null
show_progress: True
seed: 2022
